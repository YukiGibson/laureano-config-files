services:
  technitium:
    image: technitium/dns-server:latest
    container_name: technitium-dns
    hostname: dns-server
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "5380:5380/tcp"
    environment:
      - DNS_SERVER_DOMAIN=dns-server
    volumes:
      - technitium-data:/etc/dns
    restart: unless-stopped

volumes:
  technitium-data:
